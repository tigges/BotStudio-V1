<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #f4f5f9; font-family: 'DM Sans', sans-serif; }

  .container {
    max-width: 420px; margin: 0 auto;
    height: 100vh; display: flex; flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────── */
  .header {
    padding: 16px 18px; background: var(--color, #2255e8);
    display: flex; align-items: center; gap: 11px; flex-shrink: 0;
  }
  .header-avatar {
    width: 38px; height: 38px; border-radius: 11px;
    background: rgba(255,255,255,.2); display: flex; align-items: center;
    justify-content: center; font-size: 20px;
  }
  .header-name { font-size: 15px; font-weight: 600; color: #fff; }
  .header-sub  { font-size: 11px; color: rgba(255,255,255,.75); margin-top: 1px; }

  /* ── Messages ───────────────────────────────────── */
  .messages {
    flex: 1; overflow-y: auto; padding: 16px 14px;
    display: flex; flex-direction: column; gap: 10px;
    background: #f8f9fc;
  }
  .msg { display: flex; align-items: flex-end; gap: 8px; }
  .msg.user { flex-direction: row-reverse; }
  .msg-av {
    width: 28px; height: 28px; border-radius: 9px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .msg.bot  .msg-av { background: rgba(34,85,232,.1); }
  .msg.user .msg-av { background: #1a1d2e; color: #fff; font-size: 11px; font-weight: 600; }
  .bubble-wrap { max-width: calc(100% - 42px); }
  .bubble {
    padding: 10px 13px; border-radius: 14px; font-size: 13px; line-height: 1.5;
    word-break: break-word;
  }
  .msg.bot  .bubble { background: #fff; border: 1px solid #e5e7eb; color: #1a1d2e; border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: var(--color,#2255e8); color: #fff; border-bottom-right-radius: 4px; }
  .bubble strong { font-weight: 600; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .chip {
    padding: 5px 12px; border: 1.5px solid var(--color,#2255e8);
    border-radius: 20px; font-size: 12px; color: var(--color,#2255e8);
    background: #fff; cursor: pointer; font-family: inherit;
    transition: background .12s, color .12s;
  }
  .chip:hover { background: var(--color,#2255e8); color: #fff; }

  .typing {
    display: flex; gap: 4px; padding: 11px 14px;
    background: #fff; border: 1px solid #e5e7eb; border-radius: 14px;
    width: fit-content;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: #9ca3af;
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay:.2s; }
  .typing span:nth-child(3) { animation-delay:.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }

  /* ── Input ──────────────────────────────────────── */
  .input-area {
    padding: 12px 14px; background: #fff;
    border-top: 1px solid #e5e7eb;
    display: flex; gap: 8px; align-items: center; flex-shrink: 0;
  }
  .input {
    flex: 1; padding: 9px 14px; border: 1.5px solid #e0e3ef;
    border-radius: 22px; font-family: inherit; font-size: 13px;
    outline: none; transition: border-color .15s;
  }
  .input:focus { border-color: var(--color,#2255e8); }
  .send-btn {
    width: 38px; height: 38px; border-radius: 50%; border: none;
    background: var(--color,#2255e8); cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .12s;
  }
  .send-btn:hover { opacity: .85; }
  .send-btn svg { width: 15px; height: 15px; fill: white; }

  .powered { text-align: center; font-size: 11px; color: #9ca3af; padding: 7px 0 5px; }
  .powered a { color: #9ca3af; text-decoration: none; }

  /* ── Error state ─────────────────────────────────── */
  .error-msg {
    margin: 24px 14px; padding: 14px 16px; background: #fff;
    border-radius: 12px; border: 1.5px solid #fee2e2; text-align: center;
  }
  .error-msg h2 { font-size: 16px; color: #991b1b; margin-bottom: 6px; }
  .error-msg p  { font-size: 13px; color: #6b7280; }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- filled by JS -->
</div>

<script>
(function () {
  /* ── Read params from URL ─────────────────────────── */
  const params  = new URLSearchParams(location.search);
  const BOT_KEY = params.get('k') || params.get('key') || '';
  const API     = params.get('api') || 'https://botstudio-v1-production.up.railway.app';
  const COLOR   = params.get('color') || '#2255e8';
  const NAME    = params.get('name') || 'Assistant';
  const AVATAR  = params.get('avatar') || '🤖';

  document.documentElement.style.setProperty('--color', COLOR);
  document.title = NAME;

  const app = document.getElementById('app');

  if (!BOT_KEY) {
    app.innerHTML = `
      <div class="error-msg" style="margin-top:40px">
        <h2>No bot key</h2>
        <p>Add <code>?k=your_embed_key</code> to the URL.</p>
      </div>`;
    return;
  }

  /* ── Build UI ─────────────────────────────────────── */
  app.innerHTML = `
    <div class="header">
      <div class="header-avatar">${AVATAR}</div>
      <div>
        <div class="header-name">${NAME}</div>
        <div class="header-sub" id="status">● Connecting…</div>
      </div>
    </div>
    <div class="messages" id="msgs"></div>
    <div class="input-area">
      <input class="input" id="inp" placeholder="Type a message…" autocomplete="off">
      <button class="send-btn" id="send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="powered"><a href="https://botstudio.io" target="_blank">Powered by BotStudio</a></div>
  `;

  const msgs    = document.getElementById('msgs');
  const inp     = document.getElementById('inp');
  const sendBtn = document.getElementById('send');
  const status  = document.getElementById('status');
  const history = [];

  /* ── WebSocket ────────────────────────────────────── */
  let ws;
  function connect() {
    const wsUrl = API.replace(/^http/, 'ws') + `/api/chat/ws?botKey=${BOT_KEY}`;
    ws = new WebSocket(wsUrl);
    ws.onopen = () => { status.textContent = '● Online'; };
    ws.onmessage = (e) => {
      const m = JSON.parse(e.data);
      if (m.type === 'typing') { showTyping(); return; }
      if (m.type === 'message') { hideTyping(); addMsg('bot', m.text, m.chips, m.action); }
      if (m.type === 'error')   { hideTyping(); addMsg('bot', '⚠️ ' + m.text); }
    };
    ws.onclose = () => { status.textContent = '○ Reconnecting…'; setTimeout(connect, 3000); };
    ws.onerror = () => ws.close();
  }

  function send(text) {
    if (!text.trim()) return;
    addMsg('user', text);
    history.push({ role:'user', content: text });
    inp.value = '';
    if (ws?.readyState === 1) {
      ws.send(JSON.stringify({ type:'message', text }));
    } else {
      fetch(API + '/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ botKey: BOT_KEY, message: text, history })
      }).then(r=>r.json()).then(d => {
        hideTyping(); addMsg('bot', d.reply || d.error, d.chips, d.action);
      });
    }
  }

  /* ── Render helpers ───────────────────────────────── */
  function md(t) {
    return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  }

  function addMsg(role, text, chips=[], action=null) {
    const el  = document.createElement('div');
    el.className = 'msg ' + role;
    const av  = document.createElement('div');
    av.className = 'msg-av'; av.textContent = role==='bot' ? AVATAR : 'U';
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';
    const bub = document.createElement('div');
    bub.className = 'bubble'; bub.innerHTML = md(text);
    wrap.appendChild(bub);

    if (action?.type === 'confirmed') {
      const b = action.booking;
      const card = document.createElement('div');
      card.style.cssText = 'background:#fff;border:2px solid var(--color);border-radius:12px;padding:13px;margin-top:7px;font-size:12px';
      card.innerHTML = `<strong style="font-size:14px;color:var(--color)">Booking confirmed! 🎉</strong>
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
          <div><span style="color:#6b7280">Service: </span><strong>${b.service}</strong></div>
          <div><span style="color:#6b7280">Date: </span><strong>${b.dateLabel}</strong></div>
          <div><span style="color:#6b7280">Ref: </span><code style="background:#eef2fd;color:var(--color);padding:1px 6px;border-radius:4px">${b.ref}</code></div>
        </div>`;
      wrap.appendChild(card);
    }

    if (chips?.length) {
      const ch = document.createElement('div');
      ch.className = 'chips';
      chips.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'chip'; btn.textContent = c;
        btn.onclick = () => { send(c); ch.remove(); };
        ch.appendChild(btn);
      });
      wrap.appendChild(ch);
    }

    if (role === 'bot') { el.appendChild(av); el.appendChild(wrap); }
    else { el.appendChild(wrap); el.appendChild(av); }
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  let typingEl = null;
  function showTyping() {
    if (typingEl) return;
    const el = document.createElement('div');
    el.className = 'msg bot';
    const av = document.createElement('div'); av.className='msg-av'; av.textContent=AVATAR;
    const t  = document.createElement('div'); t.className='typing';
    t.innerHTML='<span></span><span></span><span></span>';
    el.appendChild(av); el.appendChild(t);
    typingEl = el; msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight;
  }
  function hideTyping() { if(typingEl){typingEl.remove();typingEl=null;} }

  sendBtn.addEventListener('click', ()=>send(inp.value));
  inp.addEventListener('keydown', e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(inp.value);}});
  connect();
})();
</script>
</body>
</html>
