async function testLlmConnection(direct = false) {
  const { provider, apiKey, proxyUrl } = S.llm;
  if (!provider) { S.llm.testMsg = '✕ Select a provider first'; render(); return; }
  S.llm.testing = direct ? 'direct' : 'proxy'; S.llm.testMsg = ''; render();

  try {
    let reply = '';

    if (!direct && proxyUrl) {
      /* test through Railway proxy — tests Railway's env vars */
      const res = await fetch(`${proxyUrl}/api/test-llm?provider=${provider}`);
      const data = await res.json();
      if (data.ok) { reply = `[via Railway] ${data.response}`; }
      else throw new Error(`[Railway] ${data.error || 'proxy returned error'}`);
    } else if (!apiKey) {
      throw new Error('Enter an API key or Proxy URL');
    } else if (provider === 'gemini') {
      /* test Gemini directly from browser */
      const models = ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-pro'];
      let lastErr = '';
      for (const m of models) {
        const res = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${apiKey}`,
          { method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ contents:[{role:'user',parts:[{text:'Say: OK'}]}], generationConfig:{maxOutputTokens:5} }) }
        );
        const d = await res.json();
        if (!d.error) { reply = d.candidates?.[0]?.content?.parts?.[0]?.text || 'OK'; break; }
        lastErr = `${m}: ${d.error.message}`;
      }
      if (!reply) throw new Error(lastErr || 'all Gemini models failed');
    } else {
      /* test Claude directly from browser */
      const models = ['claude-3-haiku-20240307', 'claude-instant-1.2'];
      let lastErr = '';
      for (const m of models) {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {'Content-Type':'application/json','x-api-key':apiKey,
            'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},
          body: JSON.stringify({model:m, max_tokens:10, messages:[{role:'user',content:'Say: OK'}]})
        });
        const d = await res.json();
        if (!d.error && res.ok) { reply = d.content?.[0]?.text || 'OK'; break; }
        lastErr = `${m} (${res.status}): ${d.error?.message || d.error?.type || JSON.stringify(d.error)}`;
      }
      if (!reply) throw new Error(lastErr || 'all Claude models failed');
    }

    S.llm.testMsg = `✓ ${reply?.trim().slice(0,60)}`;
  } catch(e) {
    S.llm.testMsg = `✕ ${e.message}`;
  }
  S.llm.testing = false;
  render();
}

/* ===============================================================================
   GOOGLE DRIVE STORAGE
   Scope: drive.appdata — hidden app folder, 15 GB, free
   =============================================================================== */
const GD_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
const GD_API   = 'https://www.googleapis.com/drive/v3';
const GD_UP    = 'https://www.googleapis.com/upload/drive/v3';

async function gdReq(path, method = 'GET', body = null, params = '', isUpload = false) {
  const token = S.gd.accessToken;
  if (!token) return null;
  const base = isUpload ? GD_UP : GD_API;
  try {
    const res = await fetch(`${base}/${path}${params ? '?' + params : ''}`, {
      method,
      headers: {
        'Authorization': 'Bearer ' + token,
        ...(body && !isUpload ? {'Content-Type': 'application/json'} : {}),
      },
      body: body ? (typeof body === 'string' ? body : JSON.stringify(body)) : undefined,
    });
    if (res.status === 401) { gdHandleExpiry(); return null; }
    return res.ok ? (res.status === 204 ? {} : res.json()) : { _err: await res.text() };
  } catch(e) { return { _err: e.message }; }
}

function gdHandleExpiry() {
  S.gd.connected = false; S.gd.accessToken = '';
  sessionStorage.removeItem('bs_gd_tok');
  S.gd.testMsg = 'Token expired — click Connect to re-authorise';
  render();
}

async function gdTest() {
  if (!S.gd.accessToken) { S.gd.testMsg = 'Not connected — enter Client ID and click Connect'; render(); return; }
  S.gd.testing = true; S.gd.testMsg = ''; render();
  const r = await gdReq('files', 'GET', null, 'spaces=appDataFolder&pageSize=1&fields=files(id,name)');
  S.gd.testing = false;
  if (!r || r._err) {
    S.gd.connected = false;
    S.gd.testMsg = r?._err?.includes('401') ? 'Token expired — reconnect' : ('Error: ' + (r?._err || 'unknown'));
  } else {
    S.gd.connected = true;
    localStorage.setItem('bs_gd_id', S.gd.clientId);
    S.gd.testMsg = 'Connected — appDataFolder accessible';
  }
  render();
}

function gdConnect() {
  if (!S.gd.clientId) { alert('Enter your Google OAuth Client ID first.'); return; }
  localStorage.setItem('bs_gd_id', S.gd.clientId);
  const redirectUri = encodeURIComponent(location.href.split('#')[0].split('?')[0]);
  const url = 'https://accounts.google.com/o/oauth2/v2/auth'
    + '?client_id='     + encodeURIComponent(S.gd.clientId)
    + '&redirect_uri='  + redirectUri
    + '&scope='         + encodeURIComponent(GD_SCOPE)
    + '&response_type=token'
    + '&prompt=consent';
  const popup = window.open(url, 'gdrive-auth', 'width=520,height=640,left=200,top=80');
  const poll = setInterval(() => {
    try {
      if (popup.closed) { clearInterval(poll); return; }
      const hash = popup.location.hash;
      if (hash && hash.includes('access_token')) {
        clearInterval(poll);
        const token = new URLSearchParams(hash.slice(1)).get('access_token');
        if (token) {
          popup.close();
          S.gd.accessToken = token;
          sessionStorage.setItem('bs_gd_tok', token);
          gdTest();
        }
      }
    } catch(_) { /* cross-origin while Google is redirecting */ }
  }, 300);
}

function gdDisconnect() {
  S.gd.accessToken = ''; S.gd.connected = false; S.gd.testMsg = '';
  sessionStorage.removeItem('bs_gd_tok');
  render();
}

/* save a JSON file to appDataFolder */
async function gdSaveJson(filename, data) {
  const content = JSON.stringify(data, null, 2);
  /* check if file exists */
  const list = await gdReq('files', 'GET', null, `spaces=appDataFolder&q=name='${filename}'&fields=files(id)`);
  const fileId = list?.files?.[0]?.id;
  if (fileId) {
    /* update content */
    await fetch(`${GD_UP}/files/${fileId}?uploadType=media`, {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + S.gd.accessToken, 'Content-Type': 'application/json' },
      body: content,
    });
  } else {
    /* create new file in appDataFolder */
    const boundary = 'bs_bound_' + Date.now();
    const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n`
      + JSON.stringify({ name: filename, parents: ['appDataFolder'] })
      + `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n`
      + content + `\r\n--${boundary}--`;
    await fetch(`${GD_UP}/files?uploadType=multipart`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + S.gd.accessToken, 'Content-Type': `multipart/related; boundary="${boundary}"` },
      body,
    });
  }
}

async function gdLoadJson(filename) {
  const list = await gdReq('files', 'GET', null, `spaces=appDataFolder&q=name='${filename}'&fields=files(id)`);
  const fileId = list?.files?.[0]?.id;
  if (!fileId) return null;
  const res = await fetch(`${GD_API}/files/${fileId}?alt=media`, {
    headers: { 'Authorization': 'Bearer ' + S.gd.accessToken }
  });
  return res.ok ? res.json() : null;
}

function drawSparkline(id, data, color) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth; const h = canvas.offsetHeight || 44;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pad = 4;
  const pts = data.map((v, i) => ({
    x: pad + (i / (data.length - 1)) * (w - pad * 2),
    y: h - pad - ((v - min) / range) * (h - pad * 2)
  }));
  // Fill
  ctx.beginPath();
  ctx.moveTo(pts[0].x, h);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length-1].x, h);
  ctx.closePath();
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, color + '30'); g.addColorStop(1, color + '00');
  ctx.fillStyle = g; ctx.fill();
  // Line
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.stroke();
  // Last dot
  const last = pts[pts.length - 1];
  ctx.beginPath(); ctx.arc(last.x, last.y, 3, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
}

function drawBarChart(id, labels, values, color) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth; const h = canvas.offsetHeight || 140;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const max = Math.max(...values);
  const n = values.length;
  const gutter = 8, lblH = 22, topPad = 10;
  const bw = Math.floor((w - gutter * (n + 1)) / n);
  ctx.font = `${10 * dpr / dpr}px DM Sans`; ctx.textAlign = 'center';
  values.forEach((v, i) => {
    const bh = ((v / max) * (h - lblH - topPad));
    const x = gutter + i * (bw + gutter);
    const y = h - lblH - bh;
    ctx.fillStyle = color + (i === 0 ? '' : '99');
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, bw, bh, 3);
    else ctx.rect(x, y, bw, bh);
    ctx.fill();
    ctx.fillStyle = '#9ca3af';
    const short = labels[i].length > 7 ? labels[i].slice(0,6)+'…' : labels[i];
    ctx.fillText(short, x + bw / 2, h - 5);
  });
}

function drawLineChart(id, data, labels) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth; const h = canvas.offsetHeight || 160;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const pad = { t: 10, b: 28, l: 10, r: 10 };
  const pts = data.map((v, i) => ({
    x: pad.l + (i / (data.length - 1)) * (w - pad.l - pad.r),
    y: pad.t + ((max - v) / range) * (h - pad.t - pad.b)
  }));
  // Grid lines
  ctx.strokeStyle = '#f0f2f7'; ctx.lineWidth = 1;
  [0, 0.25, 0.5, 0.75, 1].forEach(p => {
    const y = pad.t + p * (h - pad.t - pad.b);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
  });
  // Fill
  ctx.beginPath();
  ctx.moveTo(pts[0].x, h - pad.b);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length-1].x, h - pad.b);
  ctx.closePath();
  const g = ctx.createLinearGradient(0, pad.t, 0, h - pad.b);
  g.addColorStop(0, '#2255e840'); g.addColorStop(1, '#2255e805');
  ctx.fillStyle = g; ctx.fill();
  // Line
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = '#2255e8'; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.stroke();
  // Labels
  ctx.fillStyle = '#9ca3af'; ctx.font = `10px DM Sans`; ctx.textAlign = 'center';
  labels.filter((_, i) => i % 2 === 0).forEach((l, i) => {
    const realIdx = i * 2;
    ctx.fillText(l, pts[realIdx].x, h - 6);
  });
}

function drawDonut(id, data, colors) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const size = 120;
  canvas.width = size * dpr; canvas.height = size * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cx = size / 2, cy = size / 2, r = 48, inner = 32;
  const total = data.reduce((a, b) => a + b, 0);
  let angle = -Math.PI / 2;
  data.forEach((v, i) => {
    const sweep = (v / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, angle, angle + sweep);
    ctx.arc(cx, cy, inner, angle + sweep, angle, true);
    ctx.closePath();
    ctx.fillStyle = colors[i]; ctx.fill();
    angle += sweep;
  });
}

function init() {
  try {
    render();
  } catch(e) {
    document.body.innerHTML = '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1d2e;color:#fff;font-family:monospace;padding:40px;z-index:9999"><div style="font-size:22px;margin-bottom:16px">&#x26A0; BotStudio JS Error</div><div style="font-size:14px;color:#ef4444;margin-bottom:12px">' + e.message + '</div><pre style="font-size:11px;color:#9ca3af;max-width:800px;overflow:auto;text-align:left;background:#111;padding:16px;border-radius:8px">' + (e.stack||'').replace(/</g,'&lt;') + '</pre></div>';
    return;
  }
  window.addEventListener('hashchange', () => {
    document.removeEventListener('mousemove', onFlowMove);
    document.removeEventListener('mouseup', onFlowUp);
  });
  /* if Supabase is pre-configured, test + load bots in background */
  if (S.db.url && S.db.anonKey) dbTest();
  /* if Google Drive token exists, verify it */
  if (S.gd.accessToken) gdTest();
}

// Also catch any uncaught errors
window.onerror = function(msg, src, line, col, err) {
  if (document.getElementById('app')) {
    document.body.insertAdjacentHTML('beforeend', '<div style="position:fixed;bottom:0;left:0;right:0;background:#991b1b;color:#fff;padding:10px 16px;font-family:monospace;font-size:12px;z-index:9999"><b>JS Error:</b> ' + msg + ' (line ' + line + ')</div>');
  }
  return false;
};

init();
